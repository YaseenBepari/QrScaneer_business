<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pani Puri Free Plate Offer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎉 Claim Your Free Pani Puri!</h1>
    <p class="subtitle">First-time users only — one plate per phone</p>

    <!-- Shown when no valid QR token is in the URL -->
    <div id="invalidToken" style="display:none">
      <div class="error-box">
        <span class="error-icon">🚫</span>
        <p>Invalid or missing QR code.</p>
        <p class="small">Please scan the QR code at the counter to claim your free plate.</p>
      </div>
    </div>

    <!-- Shown when a valid token is present -->
    <form id="offerForm" style="display:none">
      <div class="security-badge">🔒 Secured Offer</div>

      <div class="form-group">
        <label for="name">👤 Name:</label>
        <input type="text" id="name" placeholder="Enter your name" required>
      </div>

      <div class="form-group">
        <label for="mobile">📱 Mobile Number:</label>
        <input type="tel" id="mobile" placeholder="10-digit mobile number" pattern="[0-9]{10}" maxlength="10" required>
      </div>

      <button type="submit" id="submitBtn">
        <span id="btnText">🍽 Claim Offer</span>
        <span id="btnLoader" style="display:none">⏳ Verifying...</span>
      </button>
    </form>

    <p id="message"></p>
  </div>

  <script src="script.js" type="module"></script>
</body>
</html>
